name: Build PyTorch Wheel

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00（北京时间次日 06:00）
  workflow_dispatch:
    inputs:
      pytorch_ref:
        description: 'PyTorch 分支/tag/commit (例如: main, v2.5.0, abc123)'
        required: false
        default: 'main'
      platform:
        description: '构建平台 (all, x86, arm)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - x86
          - arm

jobs:
  build-x86:
    name: Build PyTorch (x86_64, Python ${{ matrix.python }})
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'x86' || github.event.inputs.platform == ''
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/pytorch/test-infra:cpu-x86_64-latest
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        python: [cp310, cp311, cp312, cp313]
    env:
      PYTHON_PATH: /opt/python/${{ matrix.python }}-${{ matrix.python }}/bin/python
      PIP_PATH: /opt/python/${{ matrix.python }}-${{ matrix.python }}/bin/pip
      # 保留 gcc-toolset-13 (GCC 13) 路径，同时将 manylinux Python bin 放在前面
      PATH: /opt/python/${{ matrix.python }}-${{ matrix.python }}/bin:/opt/rh/gcc-toolset-13/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-13/root/usr/lib64:/opt/rh/gcc-toolset-13/root/usr/lib

    steps:
      - name: Free disk space
        run: |
          # Container 模式下无法清理宿主机预装软件（dotnet/android 等）
          # 仅清理容器内可清理的缓存，释放部分空间
          echo "=== Disk space before cleanup ==="
          df -h

          rm -rf ~/.cache/pip/* 2>/dev/null || true
          rm -rf ~/.npm 2>/dev/null || true
          rm -rf ~/go 2>/dev/null || true

          echo "=== Disk space after cleanup ==="
          df -h

      - name: Checkout pytorch/pytorch (with retry)
        uses: actions/checkout@v4
        with:
          repository: pytorch/pytorch
          ref: ${{ github.event.inputs.pytorch_ref || 'main' }}
          submodules: false
          fetch-depth: 0

      - name: Fix git safe.directory
        run: |
          # 修复 container 环境下 git ownership 检查问题（必须在 submodule init 之前）
          git config --global --add safe.directory /__w/pytorch-infra/pytorch-infra
          git config --global --add safe.directory '*'

      - name: Initialize submodules (with retry)
        run: |
          # 子模块初始化带重试逻辑（GitHub HTTP 500 常见）
          MAX_RETRIES=5
          RETRY_DELAY=30

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES: Initializing submodules..."
            git submodule update --init --recursive && break
            echo "Failed, retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          done

          # 检查是否成功
          if [ $? -ne 0 ]; then
            echo "Failed to initialize submodules after $MAX_RETRIES attempts"
            exit 1
          fi

      - name: Setup cache directories
        run: |
          mkdir -p ~/.cache/pip
          mkdir -p ~/.cache/sccache
          chmod -R 777 ~/.cache

      - name: Verify sccache availability
        run: |
          which sccache && sccache --version || echo "sccache not found, will use direct compilation"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-x86-${{ matrix.python }}-pytorch-${{ github.sha }}
          restore-keys: |
            pip-x86-${{ matrix.python }}-pytorch-
            pip-x86-${{ matrix.python }}-

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-x86-${{ matrix.python }}-${{ github.sha }}
          restore-keys: |
            sccache-x86-${{ matrix.python }}-

      - name: Install Python build dependencies
        run: |
          # PATH 已设置到 manylinux Python bin，pip 直接安装到正确位置
          pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Configure build environment
        id: config
        run: |
          PYTORCH_COMMIT=$(git rev-parse --short HEAD)
          PYTORCH_COMMIT_DATE=$(git log -1 --format='%ci')

          echo "commit_short=${PYTORCH_COMMIT}" >> $GITHUB_OUTPUT
          echo "commit_date=${PYTORCH_COMMIT_DATE}" >> $GITHUB_OUTPUT

          # 配置构建环境变量（优化磁盘空间使用）
          echo "USE_CUDA=0" >> $GITHUB_ENV
          echo "USE_DISTRIBUTED=1" >> $GITHUB_ENV
          echo "USE_MKLDNN=1" >> $GITHUB_ENV
          echo "MAX_JOBS=2" >> $GITHUB_ENV  # 减少并行编译数，降低磁盘峰值占用
          echo "BUILD_TEST=0" >> $GITHUB_ENV

          # 配置 sccache（镜像已预配置，无需手动设置 CC/CXX）
          if command -v sccache &> /dev/null; then
            echo "SCCACHE_DIR=~/.cache/sccache" >> $GITHUB_ENV
            echo "SCCACHE_CACHE_SIZE=5G" >> $GITHUB_ENV  # 降低缓存大小，节省磁盘空间
            sccache --zero-stats 2>/dev/null || true
          fi

          echo "PyTorch commit: ${PYTORCH_COMMIT} (${PYTORCH_COMMIT_DATE})"

      - name: Build wheel
        id: build
        run: |
          # 记录构建开始时间
          BUILD_START=$(date +%s)
          echo "build_start=${BUILD_START}" >> $GITHUB_OUTPUT

          # 清理之前的构建（官方流程）
          ${{ env.PYTHON_PATH }} setup.py clean

          # 使用官方构建命令（python -m build --wheel --no-isolation）
          ${{ env.PYTHON_PATH }} -m build --wheel --no-isolation 2>&1 | tee /tmp/build.log
          BUILD_STATUS=${PIPESTATUS[0]}

          # 记录构建结束时间
          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          echo "build_end=${BUILD_END}" >> $GITHUB_OUTPUT
          echo "build_duration=${BUILD_DURATION}" >> $GITHUB_OUTPUT

          # 获取 sccache 详细统计信息
          if command -v sccache &> /dev/null; then
            # 提取缓存命中率和详细统计
            SCCACHE_OUTPUT=$(sccache -s 2>/dev/null || echo "")

            # 解析统计数据
            CACHE_HITS=$(echo "$SCCACHE_OUTPUT" | grep -E "^Cache hits" | awk '{print $3}' || echo "0")
            CACHE_MISSES=$(echo "$SCCACHE_OUTPUT" | grep -E "^Cache misses" | awk '{print $3}' || echo "0")
            CACHE_SIZE=$(echo "$SCCACHE_OUTPUT" | grep -E "^Cache size" | awk '{print $3,$4}' || echo "0 GB")

            # 计算命中率（避免除零）
            if [ "$CACHE_HITS" != "0" ] || [ "$CACHE_MISSES" != "0" ]; then
              TOTAL=$((CACHE_HITS + CACHE_MISSES))
              HIT_RATE=$(awk "BEGIN {printf \"%.1f\", ($CACHE_HITS / $TOTAL) * 100}")
            else
              HIT_RATE="0.0"
            fi

            echo "cache_hits=${CACHE_HITS}" >> $GITHUB_OUTPUT
            echo "cache_misses=${CACHE_MISSES}" >> $GITHUB_OUTPUT
            echo "cache_hit_rate=${HIT_RATE}" >> $GITHUB_OUTPUT
            echo "cache_size=${CACHE_SIZE}" >> $GITHUB_OUTPUT

            # 输出完整统计供调试
            sccache -s || true
          else
            echo "cache_hits=N/A" >> $GITHUB_OUTPUT
            echo "cache_misses=N/A" >> $GITHUB_OUTPUT
            echo "cache_hit_rate=N/A" >> $GITHUB_OUTPUT
            echo "cache_size=N/A" >> $GITHUB_OUTPUT
          fi

          echo "status=${BUILD_STATUS}" >> $GITHUB_OUTPUT
          if [ ${BUILD_STATUS} -eq 0 ]; then
            WHL=$(ls dist/*.whl 2>/dev/null | head -1)
            WHL_SIZE=$(ls -lh "$WHL" 2>/dev/null | awk '{print $5}' || echo "N/A")
            echo "wheel=${WHL}" >> $GITHUB_OUTPUT
            echo "wheel_size=${WHL_SIZE}" >> $GITHUB_OUTPUT
            echo "Build succeeded: ${WHL} (${WHL_SIZE})"
          fi
          exit ${BUILD_STATUS}

      - name: Clean build artifacts (save disk space)
        if: steps.build.outputs.status == '0'
        run: |
          echo "=== Disk space before cleanup ==="
          df -h

          # 清理 build 目录中的中间文件（保留必要的产物）
          # 删除 .o 文件、CMakeCache 等可以显著减少磁盘占用
          find build -name "*.o" -type f -delete 2>/dev/null || true
          find build -name "CMakeCache.txt" -type f -delete 2>/dev/null || true
          find build -name "*.ninja_deps" -type f -delete 2>/dev/null || true
          find build -name "*.ninja_log" -type f -delete 2>/dev/null || true

          # 清理 sccache 临时文件
          rm -rf ~/.cache/sccache/*.tmp 2>/dev/null || true

          echo "=== Disk space after cleanup ==="
          df -h

      - name: Repair wheel with auditwheel
        if: steps.build.outputs.status == '0'
        run: |
          mkdir -p wheelhouse
          auditwheel repair dist/*.whl -w wheelhouse/

          echo "=== Repaired wheels ==="
          ls -la wheelhouse/

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-x86-${{ matrix.python }}-${{ github.run_number }}
          path: /tmp/build.log
          if-no-files-found: warn

      - name: Upload wheel
        if: steps.build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-wheel-x86-${{ matrix.python }}-${{ github.run_number }}
          path: wheelhouse/*.whl
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          BUILD_STATUS="${{ steps.build.outputs.status }}"
          if [ "${BUILD_STATUS}" = "0" ]; then
            STATUS_ICON="✅ SUCCESS"
          else
            STATUS_ICON="❌ FAILED"
          fi

          # 格式化编译耗时
          BUILD_DURATION="${{ steps.build.outputs.build_duration }}"
          if [ "${BUILD_DURATION}" != "" ] && [ "${BUILD_DURATION}" -gt 0 ]; then
            HOURS=$((BUILD_DURATION / 3600))
            MINUTES=$(((BUILD_DURATION % 3600) / 60))
            SECONDS=$((BUILD_DURATION % 60))
            DURATION_STR="${HOURS}h ${MINUTES}m ${SECONDS}s"
          else
            DURATION_STR="N/A"
          fi

          # 缓存命中率
          HIT_RATE="${{ steps.build.outputs.cache_hit_rate }}"
          if [ "${HIT_RATE}" != "N/A" ] && [ "${HIT_RATE}" != "" ]; then
            HIT_RATE_STR="${HIT_RATE}%"
          else
            HIT_RATE_STR="N/A"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## PyTorch Wheel Build (x86_64)

          ### 编译信息
          | 项目 | 详情 |
          |------|------|
          | Python 版本 | \`${{ matrix.python }}\` |
          | PyTorch Commit | \`${{ steps.config.outputs.commit_short }}\` |
          | Commit 时间 | ${{ steps.config.outputs.commit_date }} |
          | 编译耗时 | ${DURATION_STR} |
          | 构建结果 | ${STATUS_ICON} |

          ### 缓存统计
          | 项目 | 详情 |
          |------|------|
          | 缓存命中率 | ${HIT_RATE_STR} |
          | Cache Hits | ${{ steps.build.outputs.cache_hits || 'N/A' }} |
          | Cache Misses | ${{ steps.build.outputs.cache_misses || 'N/A' }} |
          | Cache Size | ${{ steps.build.outputs.cache_size || 'N/A' }} |

          $( if [ "${BUILD_STATUS}" = "0" ]; then \
            echo "### 构建产物"; \
            echo "| 项目 | 详情 |"; \
            echo "|------|------|"; \
            echo "| Wheel 文件 | \`${{ steps.build.outputs.wheel }}\` |"; \
            echo "| 文件大小 | ${{ steps.build.outputs.wheel_size || 'N/A' }} |"; \
            echo ""; \
            echo "> 📦 产物已上传至 artifact: \`pytorch-wheel-x86-${{ matrix.python }}-${{ github.run_number }}\`"; \
          else \
            echo ""; \
            echo "> 🔍 查看 build-log artifact 获取详细错误信息"; \
          fi )
          EOF

  build-arm:
    name: Build PyTorch (aarch64, Python ${{ matrix.python }})
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'arm' || github.event.inputs.platform == ''

          echo "USE_CUDA=0" >> $GITHUB_ENV
          echo "USE_DISTRIBUTED=1" >> $GITHUB_ENV
          echo "USE_MKLDNN=0" >> $GITHUB_ENV  # MKLDNN 在 ARM 上不支持
          echo "MAX_JOBS=2" >> $GITHUB_ENV  # 减少并行编译数，降低磁盘峰值占用

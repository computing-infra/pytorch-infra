  build-torch-npu-x86:
    name: Build torch_npu (x86_64, Python ${{ matrix.python }})
    needs: build-x86
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'x86' || github.event.inputs.platform == ''
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/pytorch/test-infra:cpu-x86_64-latest
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        python: [cp310, cp311, cp312, cp313]
    env:
      PYTHON_PATH: /opt/python/${{ matrix.python }}-${{ matrix.python }}/bin/python
      PIP_PATH: /opt/python/${{ matrix.python }}-${{ matrix.python }}/bin/pip
      PATH: /opt/python/${{ matrix.python }}-${{ matrix.python }}/bin:/opt/rh/gcc-toolset-13/root/usr/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-13/root/usr/lib64:/opt/rh/gcc-toolset-13/root/usr/lib

    steps:
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          rm -rf ~/.cache/pip/* 2>/dev/null || true
          rm -rf ~/.npm 2>/dev/null || true
          rm -rf ~/go 2>/dev/null || true
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Download PyTorch wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pytorch-wheel-x86-${{ matrix.python }}-${{ github.run_number }}
          path: pytorch-wheel
        continue-on-error: true

      - name: Install PyTorch wheel
        id: install_pytorch
        run: |
          if [ -d "pytorch-wheel" ] && [ "$(ls -A pytorch-wheel/*.whl 2>/dev/null)" ]; then
            WHL=$(ls pytorch-wheel/*.whl | head -1)
            pip install "$WHL"
            TORCH_VER=$(python -c "import torch; print(torch.__version__)")
            echo "version=${TORCH_VER}" >> $GITHUB_OUTPUT
            echo "wheel=${WHL}" >> $GITHUB_OUTPUT
            echo "PyTorch installed: ${TORCH_VER}"
          else
            echo "No PyTorch wheel found, job may have failed"
            echo "version=N/A" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Clone Ascend/pytorch
        id: clone
        run: |
          git clone --depth=1 --recurse-submodules \
            https://gitcode.com/Ascend/pytorch.git ascend_pytorch
          cd ascend_pytorch
          COMMIT=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format='%ci')
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "Ascend/pytorch commit: ${COMMIT_SHORT} (${COMMIT_DATE})"

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-torch-npu-x86-${{ matrix.python }}-${{ steps.clone.outputs.commit }}
          restore-keys: |
            ccache-torch-npu-x86-${{ matrix.python }}-

      - name: Install build dependencies
        run: |
          cd ascend_pytorch
          pip install pyyaml setuptools auditwheel

      - name: Build torch_npu wheel
        id: build
        run: |
          cd ascend_pytorch

          # 记录构建开始时间
          BUILD_START=$(date +%s)
          echo "build_start=${BUILD_START}" >> $GITHUB_OUTPUT

          # 配置 ccache
          mkdir -p ~/.ccache
          ccache -M 5G
          ccache -z || true
          export CC="ccache gcc"
          export CXX="ccache g++"
          export CCACHE_BASEDIR="${PWD}"
          export CCACHE_DIR="${HOME}/.ccache"
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=5G

          # 构建配置
          export MAX_JOBS=2
          export DISABLE_INSTALL_TORCHAIR=FALSE
          export BUILD_WITHOUT_SHA=1

          # 执行构建
          python setup.py build bdist_wheel 2>&1 | tee /tmp/torch_npu_build.log
          BUILD_STATUS=${PIPESTATUS[0]}

          # 记录构建结束时间
          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          echo "build_end=${BUILD_END}" >> $GITHUB_OUTPUT
          echo "build_duration=${BUILD_DURATION}" >> $GITHUB_OUTPUT

          # 获取 ccache 统计
          CCACHE_OUTPUT=$(ccache -s 2>/dev/null || echo "")
          CACHE_HITS=$(echo "$CCACHE_OUTPUT" | grep -E "cache hit" | head -1 | awk '{print $3}' || echo "0")
          CACHE_MISSES=$(echo "$CCACHE_OUTPUT" | grep -E "cache miss" | head -1 | awk '{print $3}' || echo "0")

          if [ "$CACHE_HITS" != "0" ] || [ "$CACHE_MISSES" != "0" ]; then
            TOTAL=$((CACHE_HITS + CACHE_MISSES))
            HIT_RATE=$(awk "BEGIN {printf \"%.1f\", ($CACHE_HITS / $TOTAL) * 100}")
          else
            HIT_RATE="0.0"
          fi

          echo "cache_hits=${CACHE_HITS}" >> $GITHUB_OUTPUT
          echo "cache_misses=${CACHE_MISSES}" >> $GITHUB_OUTPUT
          echo "cache_hit_rate=${HIT_RATE}" >> $GITHUB_OUTPUT

          ccache -s || true

          echo "status=${BUILD_STATUS}" >> $GITHUB_OUTPUT
          if [ ${BUILD_STATUS} -eq 0 ]; then
            WHL=$(ls dist/*.whl 2>/dev/null | head -1)
            WHL_SIZE=$(ls -lh "$WHL" 2>/dev/null | awk '{print $5}' || echo "N/A")
            echo "wheel=${WHL}" >> $GITHUB_OUTPUT
            echo "wheel_size=${WHL_SIZE}" >> $GITHUB_OUTPUT
            echo "Build succeeded: ${WHL} (${WHL_SIZE})"
          fi
          exit ${BUILD_STATUS}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: torch-npu-build-log-x86-${{ matrix.python }}-${{ github.run_number }}
          path: /tmp/torch_npu_build.log
          if-no-files-found: warn

      - name: Upload torch_npu wheel
        if: steps.build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: torch-npu-wheel-x86-${{ matrix.python }}-${{ github.run_number }}
          path: ascend_pytorch/dist/*.whl
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          BUILD_STATUS="${{ steps.build.outputs.status }}"
          if [ "${BUILD_STATUS}" = "0" ]; then
            STATUS_ICON="✅ SUCCESS"
          else
            STATUS_ICON="❌ FAILED"
          fi

          # 格式化编译耗时
          BUILD_DURATION="${{ steps.build.outputs.build_duration }}"
          if [ "${BUILD_DURATION}" != "" ] && [ "${BUILD_DURATION}" -gt 0 ]; then
            HOURS=$((BUILD_DURATION / 3600))
            MINUTES=$(((BUILD_DURATION % 3600) / 60))
            SECONDS=$((BUILD_DURATION % 60))
            DURATION_STR="${HOURS}h ${MINUTES}m ${SECONDS}s"
          else
            DURATION_STR="N/A"
          fi

          HIT_RATE="${{ steps.build.outputs.cache_hit_rate }}"
          if [ "${HIT_RATE}" != "N/A" ] && [ "${HIT_RATE}" != "" ]; then
            HIT_RATE_STR="${HIT_RATE}%"
          else
            HIT_RATE_STR="N/A"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## torch_npu Build (x86_64)

          ### 编译信息
          | 项目 | 详情 |
          |------|------|
          | Python 版本 | \`${{ matrix.python }}\` |
          | PyTorch 版本 | \`${{ steps.install_pytorch.outputs.version }}\` |
          | Ascend/pytorch Commit | [\`${{ steps.clone.outputs.commit_short }}\`](https://gitcode.com/Ascend/pytorch/commit/${{ steps.clone.outputs.commit }}) |
          | Commit 时间 | ${{ steps.clone.outputs.commit_date }} |
          | 编译耗时 | ${DURATION_STR} |
          | 构建结果 | ${STATUS_ICON} |

          ### 缓存统计
          | 项目 | 详情 |
          |------|------|
          | 缓存命中率 | ${HIT_RATE_STR} |
          | Cache Hits | ${{ steps.build.outputs.cache_hits || 'N/A' }} |
          | Cache Misses | ${{ steps.build.outputs.cache_misses || 'N/A' }} |

          $( if [ "${BUILD_STATUS}" = "0" ]; then \
            echo "### 构建产物"; \
            echo "| 项目 | 详情 |"; \
            echo "|------|------|"; \
            echo "| Wheel 文件 | \`${{ steps.build.outputs.wheel }}\` |"; \
            echo "| 文件大小 | ${{ steps.build.outputs.wheel_size || 'N/A' }} |"; \
            echo ""; \
            echo "> 📦 产物已上传至 artifact: \`torch-npu-wheel-x86-${{ matrix.python }}-${{ github.run_number }}\`"; \
          else \
            echo ""; \
            echo "> 🔍 查看 torch-npu-build-log artifact 获取详细错误信息"; \
          fi )
          EOF


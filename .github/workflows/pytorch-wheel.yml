      LD_LIBRARY_PATH: /opt/rh/gcc-toolset-13/root/usr/lib64:/opt/rh/gcc-toolset-13/root/usr/lib:/opt/OpenBLAS/lib

    steps:
      - name: Free disk space
        run: |
          # Container 模式下无法清理宿主机预装软件（dotnet/android 等）
          # 仅清理容器内可清理的缓存，释放部分空间
          echo "=== Disk space before cleanup ==="
          df -h

          rm -rf ~/.cache/pip/* 2>/dev/null || true
          rm -rf ~/.npm 2>/dev/null || true
          rm -rf ~/go 2>/dev/null || true


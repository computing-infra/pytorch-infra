      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-arm-${{ matrix.python }}-pytorch-${{ github.sha }}
          restore-keys: |
            pip-arm-${{ matrix.python }}-pytorch-
            pip-arm-${{ matrix.python }}-

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-arm-${{ matrix.python }}-${{ github.sha }}
          restore-keys: |
            sccache-arm-${{ matrix.python }}-

      - name: Install Python build dependencies
        run: |
          # PATH 已设置到 manylinux Python bin，pip 直接安装到正确位置
          pip install --upgrade pip
          pip install -r requirements-build.txt


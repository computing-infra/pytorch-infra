name: Lint Ascend/pytorch

on:
  workflow_call:
    inputs:
      ascend_commit:
        description: 'Ascend/pytorch commit SHA (optional, defaults to latest)'
        required: false
        type: string
        default: ''

jobs:
  lint:
    name: Run Lint Checks
    runs-on: ubuntu-22.04
    env:
      PYTHON_VERSION: '3.11'

    steps:
      - name: Checkout pytorch-infra
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install lintrunner pyyaml jq
          # Install uv for running linter scripts with inline dependencies
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Clone Ascend/pytorch
        id: clone
        run: |
          if [ -n "${{ inputs.ascend_commit }}" ]; then
            git clone --depth=1 https://gitcode.com/Ascend/pytorch.git ascend_pytorch
            cd ascend_pytorch
            git fetch --depth=1 origin ${{ inputs.ascend_commit }}
            git checkout ${{ inputs.ascend_commit }}
          else
            git clone --depth=1 https://gitcode.com/Ascend/pytorch.git ascend_pytorch
          fi
          cd ascend_pytorch
          COMMIT=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format='%ci')
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "Ascend/pytorch commit: ${COMMIT} (${COMMIT_DATE})"

      - name: Copy lint configuration
        run: |
          cp lint-config/.lintrunner.toml ascend_pytorch/
          cp lint-config/.clang-format ascend_pytorch/
          cp -r lint-tools ascend_pytorch/
          cp -r lint-config ascend_pytorch/

      - name: Initialize linters
        working-directory: ascend_pytorch
        run: |
          lintrunner init || true

      - name: Run lint checks
        id: lint
        working-directory: ascend_pytorch
        run: |
          set +e
          echo "=== Running lintrunner on all files ==="
          lintrunner --all-files --force-color --tee-json=lint.json 2>&1 | tee lint_output.txt
          LINT_EXIT_CODE=${PIPESTATUS[0]}

          echo "=== Lint exit code: ${LINT_EXIT_CODE} ==="
          echo "=== Checking lint.json ==="
          if [ -f lint.json ]; then
            echo "lint.json exists, size: $(wc -c < lint.json) bytes"
            head -5 lint.json 2>/dev/null || echo "Cannot read lint.json"
          else
            echo "lint.json does not exist"
          fi

          ERRORS=0
          WARNINGS=0
          HAS_ISSUES="false"

          if [ -f lint.json ] && [ -s lint.json ]; then
            # lintrunner outputs JSON Lines format, need -s to slurp into array
            ERRORS=$(jq -s '[.[] | select(.severity == "error")] | length' lint.json 2>/dev/null || echo "0")
            WARNINGS=$(jq -s '[.[] | select(.severity == "warning" or .severity == "advice")] | length' lint.json 2>/dev/null || echo "0")
            echo "Lint results: ${ERRORS} errors, ${WARNINGS} warnings"
          fi

          if [ "$LINT_EXIT_CODE" -ne 0 ]; then
            HAS_ISSUES="true"
          fi

          echo "errors=${ERRORS}" >> $GITHUB_OUTPUT
          echo "warnings=${WARNINGS}" >> $GITHUB_OUTPUT
          echo "has_issues=${HAS_ISSUES}" >> $GITHUB_OUTPUT

      - name: Generate lint report
        if: steps.lint.outputs.has_issues == 'true'
        working-directory: ascend_pytorch
        run: |
          python3 -c "
          import json
          from datetime import datetime
          from collections import defaultdict

          with open('lint.json', 'r') as f:
              results = [json.loads(line) for line in f if line.strip()]

          by_code = defaultdict(list)
          for r in results:
              if r.get('severity') in ['error', 'warning', 'advice']:
                  by_code[r.get('code', 'UNKNOWN')].append(r)

          commit = '${{ steps.clone.outputs.commit }}'
          commit_short = '${{ steps.clone.outputs.commit_short }}'
          commit_date = '${{ steps.clone.outputs.commit_date }}'
          scan_time = datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')

          lines = []
          lines.append('# Lint 检查报告')
          lines.append('')
          lines.append('**扫描时间**: ' + scan_time)
          lines.append('**Ascend/pytorch Commit**: [\`' + commit_short + '\`](https://gitcode.com/Ascend/pytorch/commit/' + commit + ')')
          lines.append('**Commit 时间**: ' + commit_date)
          lines.append('')
          lines.append('## 检查结果统计')
          lines.append('')
          lines.append('| Linter | 错误数 | 警告数 |')
          lines.append('|--------|--------|--------|')

          for code in sorted(by_code.keys()):
              issues = by_code[code]
              errors = len([i for i in issues if i.get('severity') == 'error'])
              warnings = len([i for i in issues if i.get('severity') in ['warning', 'advice']])
              lines.append('| ' + code + ' | ' + str(errors) + ' | ' + str(warnings) + ' |')

          lines.append('')
          lines.append('---')
          lines.append('')
          lines.append('## 详细问题列表')
          lines.append('')

          for code in sorted(by_code.keys()):
              issues = by_code[code]
              lines.append('### ' + code)
              lines.append('')

              by_file = defaultdict(list)
              for issue in issues:
                  filepath = issue.get('path') or 'unknown'
                  by_file[filepath].append(issue)

              for filepath, file_issues in sorted(by_file.items()):
                  for issue in file_issues:
                      line_num = issue.get('line') or '?'
                      desc = issue.get('description') or ''
                      lines.append('- \`' + filepath + ':' + str(line_num) + '\`: ' + desc)

              lines.append('')

          lines.append('---')
          lines.append('*报告由 CI 自动生成*')

          with open('lint_report.md', 'w') as f:
              f.write('\n'.join(lines))

          print('Generated report with ' + str(len(results)) + ' issues')
          "

      - name: Upload lint report
        if: steps.lint.outputs.has_issues == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.run_number }}
          path: ascend_pytorch/lint_report.md
          if-no-files-found: warn

      - name: Build summary
        if: always()
        working-directory: ascend_pytorch
        run: |
          set +e

          HAS_ISSUES="${{ steps.lint.outputs.has_issues }}"
          ERRORS="${{ steps.lint.outputs.errors }}"
          WARNINGS="${{ steps.lint.outputs.warnings }}"

          if [ "$HAS_ISSUES" = "true" ]; then
            STATUS_ICON="⚠️ ISSUES FOUND"
          else
            STATUS_ICON="✅ PASSED"
          fi

          # Generate linter statistics table from lint.json
          LINTER_TABLE=""
          if [ -f lint.json ] && [ -s lint.json ]; then
            LINTER_TABLE=$(jq -rs '
              group_by(.code) |
              sort_by(.code) |
              .[] |
              {
                code: .[0].code,
                errors: [.[] | select(.severity == "error")] | length,
                warnings: [.[] | select(.severity == "warning" or .severity == "advice")] | length
              } |
              "| \(.code) | \(.errors) | \(.warnings) |"
            ' lint.json 2>/dev/null) || LINTER_TABLE=""
          fi

          # Write to GITHUB_STEP_SUMMARY
          echo "## Lint 检查报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**扫描时间**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ascend/pytorch Commit**: [\`${{ steps.clone.outputs.commit_short }}\`](https://gitcode.com/Ascend/pytorch/commit/${{ steps.clone.outputs.commit }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit 时间**: ${{ steps.clone.outputs.commit_date }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 当前检测结果统计" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Linter | 错误数 | 警告数 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ -n "$LINTER_TABLE" ]; then
            echo "$LINTER_TABLE" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **总计** | **${ERRORS:-0}** | **${WARNINGS:-0}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**结果**: ${STATUS_ICON}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_ISSUES" = "true" ]; then
            echo "> 📥 查看 lint-report artifact 获取详细报告" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ✨ 所有检查通过" >> $GITHUB_STEP_SUMMARY
          fi
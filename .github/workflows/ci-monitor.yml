name: CI Monitor

on:
  schedule:
    - cron: '0 1,7,13 * * *'
  workflow_dispatch:
    inputs:
      run_id:
        description: '指定分析的 Run ID（留空则自动扫描最新失败）'
        required: false
        default: ''
      hours:
        description: '扫描最近 N 小时（默认 24）'
        required: false
        default: '24'

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GH auth
        run: gh auth status

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gh
        run: |
          if ! command -v gh &>/dev/null; then
            (type -p wget >/dev/null || sudo apt-get install -y wget) \
              && sudo mkdir -p -m 755 /etc/apt/keyrings \
              && wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg \
                | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
              && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
              && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
                | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
              && sudo apt-get update && sudo apt-get install -y gh
          fi
          gh --version

      - name: Scan failures
        id: scan
        env:
          RUN_ID_INPUT: ${{ github.event.inputs.run_id || '' }}
          HOURS: ${{ github.event.inputs.hours || '24' }}
        run: |
          if [[ -n "$RUN_ID_INPUT" ]]; then
            echo "action=analyze" >> $GITHUB_OUTPUT
            echo "run_id=$RUN_ID_INPUT" >> $GITHUB_OUTPUT
            echo "run_name=手动指定" >> $GITHUB_OUTPUT
            echo "run_url=https://github.com/Ascend/pytorch/actions/runs/$RUN_ID_INPUT" >> $GITHUB_OUTPUT
            echo "手动指定分析 Run ID: $RUN_ID_INPUT"
          else
            SCAN_OUTPUT=$(python3 scripts/scan_failures.py --hours "$HOURS" --json 2>/tmp/scan_stderr)
            cat /tmp/scan_stderr >&2

            ACTION=$(echo "$SCAN_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('action','skip'))" 2>/dev/null || echo "skip")
            echo "action=$ACTION" >> $GITHUB_OUTPUT

            if [[ "$ACTION" != "analyze" ]]; then
              REASON=$(echo "$SCAN_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('reason','未知'))" 2>/dev/null || echo "未知")
              echo "skip_reason=$REASON" >> $GITHUB_OUTPUT
              RUN_NAME=$(echo "$SCAN_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('run',{}).get('run_name','') or d.get('run',{}).get('name',''))" 2>/dev/null || echo "")
              RUN_URL=$(echo "$SCAN_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('run',{}).get('html_url',''))" 2>/dev/null || echo "")
              echo "run_name=$RUN_NAME" >> $GITHUB_OUTPUT
              echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
              echo "跳过分析: $REASON"
              exit 0
            fi

            RUN_ID=$(echo "$SCAN_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['run']['id'])" 2>/dev/null || echo "")
            RUN_NAME=$(echo "$SCAN_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['run'].get('run_name',''))" 2>/dev/null || echo "")
            RUN_URL=$(echo "$SCAN_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['run'].get('html_url',''))" 2>/dev/null || echo "")
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
            echo "run_name=$RUN_NAME" >> $GITHUB_OUTPUT
            echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
            echo "发现需要分析的 build 失败: $RUN_ID ($RUN_NAME)"
          fi

      - name: Skip if no analysis needed
        if: steps.scan.outputs.action != 'analyze'
        run: |
          echo "跳过：${{ steps.scan.outputs.skip_reason }}"

      - name: Setup environment
        if: steps.scan.outputs.action == 'analyze'
        run: bash scripts/setup_env.sh skills
        env:
          SKIP_GITCODE: 'true'

      - name: Extract failure logs
        if: steps.scan.outputs.action == 'analyze'
        id: extract
        run: |
          RUN_ID="${{ steps.scan.outputs.run_id }}"
          LOG_DIR="/tmp/ci-analysis"
          mkdir -p "$LOG_DIR"
          python3 skills/ascend-ci-build-debugger/scripts/extract_failure_logs.py "$RUN_ID" --output "$LOG_DIR" --repo Ascend/pytorch
          echo "=== failures.json 大小 ==="
          ls -la "$LOG_DIR/failures.json"
          echo "log_dir=$LOG_DIR" >> $GITHUB_OUTPUT

      - name: Check duplicate by fingerprint
        if: steps.scan.outputs.action == 'analyze'
        id: dedup
        run: |
          LOG_DIR="${{ steps.extract.outputs.log_dir }}"
          DEDUP_OUTPUT=$(python3 scripts/check_duplicate.py --failures "$LOG_DIR/failures.json" --reports-dir reports --json 2>/tmp/dedup_stderr)
          cat /tmp/dedup_stderr >&2

          DUPLICATE=$(echo "$DEDUP_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('duplicate', False))" 2>/dev/null || echo "False")
          FINGERPRINT=$(echo "$DEDUP_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('fingerprint',''))" 2>/dev/null || echo "")
          echo "fingerprint=$FINGERPRINT" >> $GITHUB_OUTPUT

          if [[ "$DUPLICATE" == "True" ]]; then
            EXISTING=$(echo "$DEDUP_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('existing_report',''))" 2>/dev/null || echo "")
            echo "duplicate=true" >> $GITHUB_OUTPUT
            echo "existing_report=$EXISTING" >> $GITHUB_OUTPUT
            echo "发现同根因报告: $EXISTING，跳过分析"
          else
            echo "duplicate=false" >> $GITHUB_OUTPUT
            echo "无同根因报告，继续分析"
          fi

      - name: Skip duplicate
        if: steps.dedup.outputs.duplicate == 'true'
        run: |
          echo "跳过：同根因报告已存在 ${{ steps.dedup.outputs.existing_report }}"

      - name: Clone source code
        if: steps.scan.outputs.action == 'analyze' && steps.dedup.outputs.duplicate != 'true'
        run: |
          bash scripts/clone_sources.sh /tmp/sources
          df -h /tmp

      - name: Run AI analysis
        if: steps.scan.outputs.action == 'analyze' && steps.dedup.outputs.duplicate != 'true'
        id: analysis
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          RUN_ID="${{ steps.scan.outputs.run_id }}"
          LOG_DIR="${{ steps.extract.outputs.log_dir }}"
          PYTORCH_SRC="/tmp/sources/pytorch"
          TORCH_NPU_SRC="/tmp/sources/torch_npu"
          FINGERPRINT="${{ steps.dedup.outputs.fingerprint }}"

          export CI_RUN_ID="$RUN_ID"
          export PYTORCH_SRC
          export TORCH_NPU_SRC
          export LOG_DIR
          export FINGERPRINT

          echo "=== 启动 opencode AI 分析 ==="
          PROMPT="请使用 ascend-ci-build-debugger skill 分析 Ascend/pytorch CI build 阶段失败。
          环境变量已设置：CI_RUN_ID=${RUN_ID}, PYTORCH_SRC=${PYTORCH_SRC}, TORCH_NPU_SRC=${TORCH_NPU_SRC}, LOG_DIR=${LOG_DIR}, FINGERPRINT=${FINGERPRINT}
          请按 skill 工作流程执行：
          1. 失败日志已提取至 \$LOG_DIR/failures.json，直接阅读即可
          2. 用 grep/glob/read 工具在 \$PYTORCH_SRC 和 \$TORCH_NPU_SRC 源码中交叉引用定位根因
          3. 将分析报告写入 \$LOG_DIR/report.md（按 skill 中定义的 frontmatter + markdown 格式）
          注意：frontmatter 中的 fingerprint 字段值应设为 \$FINGERPRINT"

          opencode run \
            --auto \
            --model bailian/MiniMax-M3 \
            --dir "$GITHUB_WORKSPACE" \
            "$PROMPT" 2>&1 | tee /tmp/opencode_output.log

          if [[ -f "$LOG_DIR/report.md" ]]; then
            echo "report_generated=true" >> $GITHUB_OUTPUT
            echo "=== 报告已生成 ==="
            head -30 "$LOG_DIR/report.md"
          else
            echo "report_generated=false" >> $GITHUB_OUTPUT
            echo "错误：报告未生成"
            echo "=== opencode 输出末尾 ==="
            tail -50 /tmp/opencode_output.log
          fi
        timeout-minutes: 15

      - name: Save report
        if: steps.analysis.outputs.report_generated == 'true'
        id: save
        run: |
          RUN_ID="${{ steps.scan.outputs.run_id }}"
          LOG_DIR="${{ steps.extract.outputs.log_dir }}"
          TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y-%-m-%-d-%-H-%M')
          REPORT_FILE="reports/${RUN_ID}-${TIMESTAMP}.md"
          mkdir -p reports
          cp "$LOG_DIR/report.md" "$REPORT_FILE"
          echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT
          echo "报告已保存: $REPORT_FILE"

      - name: Commit report
        if: steps.analysis.outputs.report_generated == 'true'
        run: |
          REPORT_FILE="${{ steps.save.outputs.report_file }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$REPORT_FILE"
          git commit -m "report: add analysis for $REPORT_FILE" || echo "无变更需提交"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main

      - name: Notify Feishu
        if: steps.analysis.outputs.report_generated == 'true'
        run: |
          REPORT_FILE="${{ steps.save.outputs.report_file }}"
          python3 scripts/notify_feishu.py \
            --report "$REPORT_FILE" \
            --repo-url "${{ github.server_url }}/${{ github.repository }}"
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

      - name: Summary
        if: always()
        run: |
          echo "## CI Monitor Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          RUN_URL="${{ steps.scan.outputs.run_url }}"
          RUN_NAME="${{ steps.scan.outputs.run_name }}"
          if [[ -n "$RUN_URL" ]]; then
            echo "**Action 执行**: [$RUN_NAME]($RUN_URL)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ steps.scan.outputs.action }}" != "analyze" ]]; then
            echo "⏭️ 跳过分析: ${{ steps.scan.outputs.skip_reason }}" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ steps.dedup.outputs.duplicate }}" == "true" ]]; then
            echo "⏭️ 跳过：同根因报告已存在 ${{ steps.dedup.outputs.existing_report }}" >> $GITHUB_STEP_SUMMARY
            echo "指纹: \`${{ steps.dedup.outputs.fingerprint }}\`" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ steps.analysis.outputs.report_generated }}" == "true" ]]; then
            echo "✅ 已分析并生成报告" >> $GITHUB_STEP_SUMMARY
            echo "报告: ${{ steps.save.outputs.report_file }}" >> $GITHUB_STEP_SUMMARY
            echo "指纹: \`${{ steps.dedup.outputs.fingerprint }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 分析未完成" >> $GITHUB_STEP_SUMMARY
          fi

name: NPU Test (PyTorch Official Tests)

on:
  push:
    paths:
      - '.github/workflows/npu-test.yml'
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00（北京时间次日 07:00），构建后 1 小时
  workflow_dispatch:

jobs:
  test:
    name: Run PyTorch Tests on NPU
    runs-on: [self-hosted, npu-910b]
    container:
      image: swr.cn-north-4.myhuaweicloud.com/frameworkptadapter/pytorch_2.11.0_a2_aarch64_builder:20260331
      options: --user root --device /dev/davinci4 --device /dev/davinci_manager --device /dev/devmm_svm --device /dev/hisi_hdc -v /usr/local/sbin/npu-smi:/usr/local/sbin/npu-smi -v /usr/local/Ascend/driver:/usr/local/Ascend/driver -v /usr/local/Ascend/firmware:/usr/local/Ascend/firmware -v /usr/local/Ascend/cann:/usr/local/Ascend/cann -v /usr/local/Ascend/nnal:/usr/local/Ascend/nnal
    env:
      PYTHON_VERSION: '3.11'
      DOCKER_IMAGE: swr.cn-north-4.myhuaweicloud.com/frameworkptadapter/pytorch_2.11.0_a2_aarch64_builder:20260331
      PYTORCH_TESTING_DEVICE_ONLY_FOR: 'privateuseone'

    steps:
      - name: Checkout pytorch-infra (via proxy)
        shell: bash
        run: |
          # 清理工作目录
          rm -rf * .[!.]* 2>/dev/null || true
          git clone --depth=1 https://gh-proxy.test.osinfra.cn/https://github.com/computing-infra/pytorch-infra.git .
          echo "Repository cloned successfully"

      - name: Setup cache directories
        run: |
          mkdir -p ~/.cache/pip
          chmod -R 777 ~/.cache

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-arm-py${{ env.PYTHON_VERSION }}-test
          restore-keys: |
            pip-arm-py${{ env.PYTHON_VERSION }}-

      - name: Download latest successful build wheel
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: nightly-build-arm.yml
          workflow_conclusion: success
          repo: computing-infra/pytorch-infra
          name: torch_npu-wheel-arm-
          name_is_regexp: true
          path: wheel_artifact

      - name: Find wheel file
        id: find_wheel
        run: |
          WHL=$(find wheel_artifact -name "*.whl" | head -1)
          if [ -z "$WHL" ]; then
            echo "::error::No wheel file found in artifact"
            exit 1
          fi
          echo "wheel_path=${WHL}" >> $GITHUB_OUTPUT
          echo "Downloaded wheel: ${WHL}"

      - name: Install PyTorch nightly and torch_npu
        id: install
        run: |
          PYTHON=python${{ env.PYTHON_VERSION }}
          PIP=pip${{ env.PYTHON_VERSION }}

          export PIP_CACHE_DIR=~/.cache/pip

          # 安装 PyTorch nightly（CPU 版，aarch64）
          $PIP install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu
          TORCH_VER=$($PYTHON -c "import torch; print(torch.__version__)")
          echo "torch_version=${TORCH_VER}" >> $GITHUB_OUTPUT
          echo "PyTorch nightly version: ${TORCH_VER}"

          # 安装 torch_npu wheel
          $PIP install "${{ steps.find_wheel.outputs.wheel_path }}"
          echo "torch_npu installed"

      - name: Check Ascend paths
        shell: bash
        run: |
          echo "=== Checking Ascend paths ==="
          ls -la /usr/local/Ascend/ 2>&1 || echo "/usr/local/Ascend not found"
          ls -la /usr/local/Ascend/cann/ 2>&1 || echo "/usr/local/Ascend/cann not found"
          ls -la /usr/local/Ascend/nnal/ 2>&1 || echo "/usr/local/Ascend/nnal not found"
          echo "=== Checking set_env.sh files ==="
          cat /usr/local/Ascend/cann/set_env.sh 2>&1 || echo "cann/set_env.sh not found"
          cat /usr/local/Ascend/nnal/atb/set_env.sh 2>&1 || echo "nnal/atb/set_env.sh not found"

      - name: Verify NPU availability
        shell: bash
        run: |
          # 加载 CANN 环境变量
          source /usr/local/Ascend/cann/set_env.sh
          source /usr/local/Ascend/nnal/atb/set_env.sh

          # 显示环境变量
          echo "=== Environment ==="
          echo "ASCEND_HOME_PATH: $ASCEND_HOME_PATH"
          echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"

          PYTHON=python3.11
          echo "=== Testing torch_npu import ==="
          $PYTHON -c "import torch; print(f'torch: {torch.__version__}'); import torch_npu; print(f'torch_npu: {torch_npu.__version__}'); print(f'NPU available: {torch.npu.is_available()}'); print(f'NPU count: {torch.npu.device_count()}'); print(f'NPU name: {torch.npu.get_device_name(0) if torch.npu.is_available() else \"N/A\"}')"

      - name: Clone official PyTorch repository
        id: clone_pytorch
        shell: bash
        run: |
          git clone --depth=1 https://gh-proxy.test.osinfra.cn/https://github.com/pytorch/pytorch.git official_pytorch
          cd official_pytorch
          COMMIT=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format='%ci')
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT
          echo "PyTorch official commit: ${COMMIT} (${COMMIT_DATE})"

      - name: Run core tests on NPU
        id: run_tests
        shell: bash
        run: |
          # 加载 CANN 环境变量
          source /usr/local/Ascend/cann/set_env.sh
          source /usr/local/Ascend/nnal/atb/set_env.sh

          PYTHON=python${{ env.PYTHON_VERSION }}
          cd official_pytorch

          # 设置测试环境变量：只运行 privateuseone (NPU) 设备的测试
          export PYTORCH_TESTING_DEVICE_ONLY_FOR="privateuseone"

          # 创建测试日志目录
          mkdir -p /tmp/test_logs

          # 运行核心测试（分阶段执行，便于定位问题）
          TEST_RESULT=0

          # 1. 基础张量测试 (test_torch)
          echo "=== Running test_torch ===" | tee /tmp/test_logs/test_torch.log
          $PYTHON test/run_test.py --include test_torch 2>&1 | tee -a /tmp/test_logs/test_torch.log
          if [ $? -ne 0 ]; then
            echo "test_torch: FAILED"
            TEST_RESULT=1
          else
            echo "test_torch: PASSED"
          fi

          # 2. NN 模块测试 (test_nn)
          echo "=== Running test_nn ===" | tee /tmp/test_logs/test_nn.log
          $PYTHON test/run_test.py --include test_nn 2>&1 | tee -a /tmp/test_logs/test_nn.log
          if [ $? -ne 0 ]; then
            echo "test_nn: FAILED"
            TEST_RESULT=1
          else
            echo "test_nn: PASSED"
          fi

          # 3. 自动微分测试 (test_autograd)
          echo "=== Running test_autograd ===" | tee /tmp/test_logs/test_autograd.log
          $PYTHON test/run_test.py --include test_autograd 2>&1 | tee -a /tmp/test_logs/test_autograd.log
          if [ $? -ne 0 ]; then
            echo "test_autograd: FAILED"
            TEST_RESULT=1
          else
            echo "test_autograd: PASSED"
          fi

          # 4. 算子测试 (test_ops) - 可能耗时较长
          echo "=== Running test_ops ===" | tee /tmp/test_logs/test_ops.log
          $PYTHON test/run_test.py --include test_ops 2>&1 | tee -a /tmp/test_logs/test_ops.log
          if [ $? -ne 0 ]; then
            echo "test_ops: FAILED"
            TEST_RESULT=1
          else
            echo "test_ops: PASSED"
          fi

          echo "test_result=${TEST_RESULT}" >> $GITHUB_OUTPUT
          exit ${TEST_RESULT}

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_number }}
          path: /tmp/test_logs
          if-no-files-found: warn

      - name: Test summary
        if: always()
        run: |
          TEST_RESULT="${{ steps.run_tests.outputs.test_result }}"
          if [ "${TEST_RESULT}" = "0" ]; then
            STATUS_ICON="✅ ALL PASSED"
          else
            STATUS_ICON="❌ SOME FAILED"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## PyTorch Official Tests on NPU

          | 项目 | 详情 |
          |------|------|
          | 测试时间 | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | Docker 镜像 | \`${{ env.DOCKER_IMAGE }}\` |
          | PyTorch Nightly | \`${{ steps.install.outputs.torch_version }}\` |
          | PyTorch 官方 Commit | [\`${{ steps.clone_pytorch.outputs.commit_short }}\`](https://github.com/pytorch/pytorch/commit/${{ steps.clone_pytorch.outputs.commit }}) |
          | Wheel 文件 | \`${{ steps.find_wheel.outputs.wheel_path }}\` |
          | 测试结果 | ${STATUS_ICON} |

          > 查看 test-logs artifact 获取详细测试输出
          EOF
# Lintrunner configuration for Ascend/pytorch
# Adapted from PyTorch's .lintrunner.toml

# C++ 代码格式化检查
[[linter]]
code = 'CLANGFORMAT'
include_patterns = [
    'torch_npu/csrc/**/*.h',
    'torch_npu/csrc/**/*.cpp',
    'torch_npu/csrc/**/*.hpp',
    'torch_npu/csrc/**/*.cuh',
    'torch_npu/csrc/**/*.cu',
]
exclude_patterns = [
    'third_party/**',
    '**/generated/**',
    '**/fb/**',
]
init_command = [
    'python3',
    'lint-tools/adapters/s3_init.py',
    '--config-json=lint-tools/adapters/s3_init_config.json',
    '--linter=clang-format',
    '--dry-run={{DRYRUN}}',
    '--output-dir=.lintbin',
    '--output-name=clang-format',
]
command = [
    'python3',
    'lint-tools/adapters/clangformat_linter.py',
    '--binary=.lintbin/clang-format',
    '--',
    '@{{PATHSFILE}}'
]
is_formatter = true

# 换行符检查（确保使用 LF）
[[linter]]
code = 'NEWLINE'
include_patterns = ['**']
exclude_patterns = [
    'third_party/**',
    '**/*.png',
    '**/*.gz',
    '**/*.zip',
    '**/*.whl',
    '**/*.patch',
    '**/*.pdf',
    '**/*.so',
    '**/*.pyc',
    '**/__pycache__/**',
]
command = [
    'python3',
    'lint-tools/adapters/newlines_linter.py',
    '--',
    '@{{PATHSFILE}}',
]
is_formatter = true

# 尾部空格检查
[[linter]]
code = 'SPACES'
include_patterns = ['**']
exclude_patterns = [
    'third_party/**',
    '**/*.png',
    '**/*.gz',
    '**/*.zip',
    '**/*.whl',
    '**/*.patch',
    '**/*.pdf',
    '**/*.so',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    '--pattern=[[:blank:]]$',
    '--linter-name=SPACES',
    '--error-name=trailing spaces',
    '--replace-pattern=s/[[:blank:]]+$//',
    '--error-description=This line has trailing spaces; please remove them.',
    '--',
    '@{{PATHSFILE}}'
]

# Tab 检查（应该使用空格）
[[linter]]
code = 'TABS'
include_patterns = ['**']
exclude_patterns = [
    'third_party/**',
    '**/Makefile',
    '**/*.svg',
    '**/*.patch',
    '.lintrunner.toml',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    # @lint-ignore TXT2
    '--pattern=	',
    '--linter-name=TABS',
    '--error-name=saw some tabs',
    '--replace-pattern=s/\t/    /',
    '--error-description=This line has tabs; please replace them with spaces.',
    '--',
    '@{{PATHSFILE}}'
]

# 非中断空格检查
[[linter]]
code = 'NOBREAKSPACE'
include_patterns = ['**']
exclude_patterns = [
    'third_party/**',
    '**/*.png',
    '**/*.gz',
    '**/*.pdf',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    # 非中断空格 U+00A0
    '--pattern= ',
    '--linter-name=NOBREAKSPACE',
    '--error-name=non-breaking space',
    '--error-description=This line has a non-breaking space (U+00A0); please convert it to a regular space (U+0020).',
    '--',
    '@{{PATHSFILE}}'
]
# =====================================================
# 第一批迁移：通用代码质量工具
# =====================================================

# Ruff - Python 综合检查 + 格式化（替代 flake8 + isort）
[[linter]]
code = 'RUFF'
include_patterns = [
    'torch_npu/**/*.py',
    'torch_npu/**/*.pyi',
    'test/**/*.py',
    'ci/**/*.py',
    'examples/**/*.py',
    'setup.py',
    'build_libtorch_npu.py',
]
exclude_patterns = [
    'third_party/**',
    '**/generated/**',
    '**/__pycache__/**',
]
command = [
    'uv',
    'run',
    '--script',
    'lint-tools/adapters/ruff_linter.py',
    '--config=lint-config/ruff.toml',
    '--show-disable',
    '--',
    '@{{PATHSFILE}}'
]
is_formatter = true

# Codespell - 拼写错误检查
[[linter]]
code = 'CODESPELL'
include_patterns = ['**']
exclude_patterns = [
    'third_party/**',
    '**/*.png',
    '**/*.gz',
    '**/*.zip',
    '**/*.whl',
    '**/*.patch',
    '**/*.pdf',
    '**/*.so',
    '**/*.bin',
    '**/*.pt',
    '**/*.pth',
    '**/__pycache__/**',
]
command = [
    'uv',
    'run',
    '--script',
    'lint-tools/adapters/codespell_linter.py',
    '--',
    '@{{PATHSFILE}}'
]
is_formatter = true

# ShellCheck - Shell 脚本检查
[[linter]]
code = 'SHELLCHECK'
include_patterns = [
    '**/*.sh',
    '**/*.bash',
]
exclude_patterns = [
    'third_party/**',
]
command = [
    'uv',
    'run',
    '--script',
    'lint-tools/adapters/shellcheck_linter.py',
    '--',
    '@{{PATHSFILE}}'
]

# Actionlint - GitHub Actions workflow 检查
[[linter]]
code = 'ACTIONLINT'
include_patterns = [
    '.github/workflows/*.yml',
    '.github/workflows/*.yaml',
]
command = [
    'python3',
    'lint-tools/adapters/actionlint_linter.py',
    '--binary=.lintbin/actionlint',
    '--',
    '@{{PATHSFILE}}'
]
init_command = [
    'python3',
    'lint-tools/adapters/s3_init.py',
    '--config-json=lint-tools/adapters/s3_init_config.json',
    '--linter=actionlint',
    '--dry-run={{DRYRUN}}',
    '--output-dir=.lintbin',
    '--output-name=actionlint',
]

# =====================================================
# 第二批迁移：Python 最佳实践
# =====================================================

# ROOT_LOGGING - 禁止直接使用 root logger
[[linter]]
code = 'ROOT_LOGGING'
include_patterns = [
    'torch_npu/**/*.py',
    'ci/**/*.py',
    'examples/**/*.py',
]
exclude_patterns = [
    'third_party/**',
    'torch_npu/_logging/__init__.py',  # logging 模块本身
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    '--pattern=logging\.(debug|info|warn|warning|error|critical|log|exception)\(',
    '--replace-pattern=s/logging\.(debug|info|warn|warning|error|critical|log|exception)\(/log.\1(/',
    '--linter-name=ROOT_LOGGING',
    '--error-name=use of root logger',
    '--error-description=Do not use root logger (logging.info, etc) directly; instead define "log = logging.getLogger(__name__)" and call, e.g., log.info().',
    '--',
    '@{{PATHSFILE}}'
]

# NOQA - 检查未限定的 noqa
[[linter]]
code = 'NOQA'
include_patterns = [
    'torch_npu/**/*.py',
    'torch_npu/**/*.pyi',
    'ci/**/*.py',
]
exclude_patterns = [
    'third_party/**',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    '--pattern=# noqa([^:]|$)',
    '--linter-name=NOQA',
    '--error-name=unqualified noqa',
    '--error-description=This line has an unqualified "noqa"; please convert it to "noqa: XXXX".',
    '--',
    '@{{PATHSFILE}}'
]

# TYPEIGNORE - 检查未限定的 type: ignore
[[linter]]
code = 'TYPEIGNORE'
include_patterns = [
    'torch_npu/**/*.py',
    'torch_npu/**/*.pyi',
    'ci/**/*.py',
]
exclude_patterns = [
    'third_party/**',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    '--pattern=# type:\s*ignore([^\[]|$)',
    '--linter-name=TYPEIGNORE',
    '--error-name=unqualified type: ignore',
    '--error-description=This line has an unqualified "type: ignore"; please convert it to "type: ignore[xxxx]".',
    '--',
    '@{{PATHSFILE}}'
]

# PYFMT - Python 格式化 (usort + ruff-format)
[[linter]]
code = 'PYFMT'
include_patterns = [
    'torch_npu/**/*.py',
    'torch_npu/**/*.pyi',
    'test/**/*.py',
    'ci/**/*.py',
    'examples/**/*.py',
]
exclude_patterns = [
    'third_party/**',
    '**/generated/**',
    '**/__pycache__/**',
]
command = [
    'uv',
    'run',
    '--script',
    'lint-tools/adapters/pyfmt_linter.py',
    '--',
    '@{{PATHSFILE}}'
]
is_formatter = true

# =====================================================
# 第三批迁移：C++ 最佳实践
# =====================================================

# C10_UNUSED - 检查已弃用的 C10_UNUSED 宏
[[linter]]
code = 'C10_UNUSED'
include_patterns = [
    '**/*.cpp',
    '**/*.h',
]
exclude_patterns = [
    'third_party/**',
    'test/**',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    '--pattern=C10_UNUSED',
    '--linter-name=C10_UNUSED',
    '--error-name=deprecated C10_UNUSED macro',
    '--replace-pattern=s/C10_UNUSED/[[maybe_unused]]/',
    '--error-description=Deprecated macro, use [[maybe_unused]] directly.',
    '--',
    '@{{PATHSFILE}}'
]

# C10_NODISCARD - 检查已弃用的 C10_NODISCARD 宏
[[linter]]
code = 'C10_NODISCARD'
include_patterns = [
    '**/*.cpp',
    '**/*.h',
]
exclude_patterns = [
    'third_party/**',
    'test/**',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    '--pattern=C10_NODISCARD',
    '--linter-name=C10_NODISCARD',
    '--error-name=deprecated C10_NODISCARD macro',
    '--replace-pattern=s/C10_NODISCARD/[[nodiscard]]/',
    '--error-description=Deprecated macro, use [[nodiscard]] directly.',
    '--',
    '@{{PATHSFILE}}'
]

# RAWTHROW - 禁止直接使用 throw 语句
[[linter]]
code = 'RAWTHROW'
include_patterns = [
    '**/*.cpp',
    '**/*.h',
]
exclude_patterns = [
    'third_party/**',
    'test/**',
    # Python binding code uses throw python_error()
    'torch_npu/csrc/npu/Stream.cpp',
    'torch_npu/csrc/npu/Event.cpp',
    # Exception handling in specific modules
    'torch_npu/csrc/npu/DataParallelComm.cpp',
    'torch_npu/csrc/framework/OpParamMaker.cpp',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    '--pattern=\bthrow\b',
    '--allowlist-pattern=@allow-raw-throw',
    '--linter-name=RAWTHROW',
    '--error-name=raw throw statement',
    '--error-description=Do not use raw throw in C++ code. Use TORCH_CHECK or other error-reporting macros instead. See c10/util/Exception.h for available macros.',
    '--',
    '@{{PATHSFILE}}'
]

# INCLUDE - 检查 #include 格式（统一使用尖括号）
[[linter]]
code = 'INCLUDE'
include_patterns = [
    '**/*.cpp',
    '**/*.h',
]
exclude_patterns = [
    'third_party/**',
    'test/**',
]
command = [
    'python3',
    'lint-tools/adapters/grep_linter.py',
    '--pattern=#include "torch_npu',
    '--linter-name=INCLUDE',
    '--error-name=quoted include for project header',
    '--replace-pattern=s/#include "torch_npu(.*)"/#include <torch_npu\1>/',
    '--error-description=This #include uses quotes for project header; please convert it to #include <torch_npu/xxxx>.',
    '--',
    '@{{PATHSFILE}}'
]

# =====================================================
# 第四批迁移：构建系统检查
# =====================================================

# CMAKE - CMake 文件格式检查
[[linter]]
code = 'CMAKE'
include_patterns = [
    '**/*.cmake',
    '**/*.cmake.in',
    '**/CMakeLists.txt',
]
exclude_patterns = [
    'third_party/**',
    '**/generated/**',
]
command = [
    'uv',
    'run',
    '--script',
    'lint-tools/adapters/cmake_linter.py',
    '--config=lint-config/.cmakelintrc',
    '--',
    '@{{PATHSFILE}}',
]

# PYPROJECT - pyproject.toml 检查
[[linter]]
code = 'PYPROJECT'
include_patterns = [
    '**/pyproject.toml',
]
exclude_patterns = [
    'third_party/**',
]
command = [
    'uv',
    'run',
    '--script',
    'lint-tools/adapters/pyproject_linter.py',
    '--',
    '@{{PATHSFILE}}',
]

# CMAKE_MINIMUM_REQUIRED - CMake/pyproject 最低版本检查
[[linter]]
code = 'CMAKE_MINIMUM_REQUIRED'
include_patterns = [
    '**/pyproject.toml',
    '**/CMakeLists.txt',
    '**/CMakeLists.txt.in',
    '**/*.cmake',
    '**/*.cmake.in',
    '**/*requirements*.txt',
    '**/*requirements*.in',
]
exclude_patterns = [
    'third_party/**',
]
command = [
    'uv',
    'run',
    '--script',
    'lint-tools/adapters/cmake_minimum_required_linter.py',
    '--',
    '@{{PATHSFILE}}',
]
